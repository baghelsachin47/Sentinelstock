name: Sentinel CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff
        pip install -r requirements.txt
        
    - name: Lint with Ruff
      run: |
        # Run Ruff to check for syntax errors and undefined names
        # --output-format=github formats the errors nicely in the GitHub UI
        ruff check . --output-format=github